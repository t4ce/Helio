name: Deploy Web Demos to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Trigger only when the helio crate version is bumped
      - "crates/helio/Cargo.toml"
  workflow_dispatch:

# Allow only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build WASM demos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-${{ runner.os }}-

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build all demos (release)
        run: ./build-wasm.sh --release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/wasm-prebuilt

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
