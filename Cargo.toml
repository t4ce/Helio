[workspace]
members = [
    "crates/helio-v3",
    "crates/helio",
    "crates/libhelio",
    "crates/helio-live-portal",
    "crates/helio-asset-compat",
    "crates/examples",

    # GPU-driven pass crates (each O(1) CPU)
    "crates/helio-pass-sky-lut",
    "crates/helio-pass-sky",
    "crates/helio-pass-indirect-dispatch",
    "crates/helio-pass-depth-prepass",
    "crates/helio-pass-hiz",
    "crates/helio-pass-occlusion-cull",
    "crates/helio-pass-light-cull",
    "crates/helio-pass-shadow-matrix",
    "crates/helio-pass-shadow-dirty",
    "crates/helio-pass-shadow",
    "crates/helio-pass-gbuffer",
    "crates/helio-pass-ssao",
    "crates/helio-pass-deferred-light",
    "crates/helio-pass-hlfs",
    "crates/helio-pass-transparent",
    "crates/helio-pass-billboard",
    "crates/helio-pass-virtual-geometry",
    "crates/helio-pass-taa",
    "crates/helio-pass-fxaa",
    "crates/helio-pass-smaa",
    "crates/helio-pass-debug",
    "crates/helio-pass-perf-overlay",
    "crates/helio-pass-radiance-cascades",
    "crates/helio-pass-simple-cube",
    "crates/helio-pass-sdf",
    "crates/helio-pass-water-sim",
    "crates/helio-pass-water-caustics",
    "crates/helio-pass-water-surface",
    "crates/helio-pass-underwater",

    # WASM infrastructure
    "crates/helio-wasm",
    "crates/helio-web-demos",

    # Baking (offline AO, lightmaps, reflection probes, PVS via Nebula)
    "crates/helio-bake",

    # Offline / tooling crates (no window required)
    "crates_other/helio-snapshot",
]
resolver = "2"

[workspace.dependencies]
wgpu = { git = "https://github.com/Far-Beyond-Pulsar/wgpu", rev = "fce5b80e8017304449124b12637ec324417e40c8", default-features = false, features = ["web", "webgpu", "wgsl", "dx12", "metal", "vulkan"] }
blade-graphics = { git = "https://github.com/tristanpoland/blade", rev = "d85bd14a78ed7729abc298906e87332257674a02" }
blade-macros =   { git = "https://github.com/tristanpoland/blade", rev = "d85bd14a78ed7729abc298906e87332257674a02" }
bytemuck = { version = "1", features = ["derive"] }
glam = { version = "0.29", features = ["bytemuck"] }
winit = "0.30.12"
env_logger = "0.11"
log = "0.4"

# SolidRS - 3D asset loading library
solid-rs =   { git = "https://github.com/Far-Beyond-Pulsar/Solid3D", rev = "c070e8ccb0324dbb0a0a5d11abd6c72f00afe291" }
solid-gltf = { git = "https://github.com/Far-Beyond-Pulsar/Solid3D", rev = "c070e8ccb0324dbb0a0a5d11abd6c72f00afe291" }
solid-fbx =  { git = "https://github.com/Far-Beyond-Pulsar/Solid3D", rev = "c070e8ccb0324dbb0a0a5d11abd6c72f00afe291" }
solid-obj =  { git = "https://github.com/Far-Beyond-Pulsar/Solid3D", rev = "c070e8ccb0324dbb0a0a5d11abd6c72f00afe291" }
solid-usd =  { git = "https://github.com/Far-Beyond-Pulsar/Solid3D", rev = "c070e8ccb0324dbb0a0a5d11abd6c72f00afe291" }

# [patch."https://github.com/Far-Beyond-Pulsar/Nebula"]
# nebula = { path = "../Nebula/crates/nebula" }
