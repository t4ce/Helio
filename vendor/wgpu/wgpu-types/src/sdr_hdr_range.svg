<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 170" width="540" height="170" font-family="sans-serif"><title>SDR vs HDR value range number line</title><desc>A number line: 0.0 black, 0 to 1 is the SDR range, 1.0 is SDR reference white, values above 1.0 are HDR headroom up to the display's peak.</desc><style>.t{font-size:12px;fill:#888}.tb{font-size:12px;fill:#888;font-weight:bold}.cap{font-size:11px;fill:#888}.ax{stroke:#888;stroke-width:1.5}</style><!-- SDR band 0..1 : x 50..300 ; HDR band 1..peak : x 300..500 --><defs><linearGradient id="sdr" x1="0" x2="1"><stop offset="0" stop-color="#111"/><stop offset="1" stop-color="#dddddd"/></linearGradient><linearGradient id="hdr" x1="0" x2="1"><stop offset="0" stop-color="#dddddd"/><stop offset="1" stop-color="#ffffff"/></linearGradient></defs><!-- SDR band --><rect x="50" y="50" width="250" height="34" fill="url(#sdr)" stroke="#888" stroke-width="1"/><!-- HDR band (outlined, brighter-than-white headroom) --><rect x="300" y="50" width="200" height="34" fill="url(#hdr)" stroke="#888" stroke-width="1" stroke-dasharray="5 3"/><!-- baseline + ticks --><line class="ax" x1="50" y1="96" x2="500" y2="96"/><g><line class="ax" x1="50" y1="90" x2="50" y2="102"/><line class="ax" x1="300" y1="88" x2="300" y2="104"/><line class="ax" x1="500" y1="90" x2="500" y2="102"/></g><text class="t" x="50" y="120" text-anchor="middle">0.0</text><text class="tb" x="300" y="120" text-anchor="middle">1.0</text><text class="t" x="500" y="120" text-anchor="middle">peak</text><!-- region labels --><text class="t" x="175" y="40" text-anchor="middle">SDR range</text><text class="t" x="400" y="40" text-anchor="middle">HDR headroom (&gt; 1.0)</text><!-- callouts --><text class="t" x="50" y="137" text-anchor="middle">black</text><text class="t" x="300" y="137" text-anchor="middle">SDR reference white</text><text class="t" x="500" y="137" text-anchor="middle">display peak</text><text class="cap" x="50" y="160">SDR clamps at 1.0. HDR drives values above 1.0, up to the display's headroom.</text></svg>