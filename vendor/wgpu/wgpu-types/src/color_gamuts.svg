<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 452" width="460" height="452" font-family="sans-serif"><title>CIE 1931 chromaticity diagram with sRGB, Display-P3 and BT.2020 gamut triangles</title><desc>The red, green and blue primaries of sRGB/BT.709, Display-P3 and BT.2020 plotted as nested triangles inside the CIE 1931 spectral locus, sharing the D65 white point. A wider triangle can express more colors.</desc>
