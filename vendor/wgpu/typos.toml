[files]
# Include .github, .cargo, etc.
ignore-hidden = false
extend-exclude = [
    '/.git',
    # spirv-asm isn't real source code
    '*.spvasm',
    'docs/big-picture.xml',
    # This test has weird pattern-derived variable names.
    'naga/tests/in/wgsl/abstract-types-builtins.wgsl',
]

# Corrections take the form of a key/value pair. The key is the incorrect word
# and the value is the correct word. If the key and value are the same, the
# word is treated as always correct. If the value is an empty string, the word
# is treated as always incorrect.

[default.extend-words]
# Things that aren't typos
consts = "consts"
lod = "lod"
metalness = "metalness"

# A DXC command line argument
Fo = "Fo"

# Abbreviation of Structured Exception Handling
SEH = "SEH"

# Content Light Level (HDR mastering metadata, e.g. MaxCLL)
CLL = "CLL"

# Usernames
Healthire = "Healthire"
REASY = "REASY"

[type.rust.extend-identifiers]
ANDed = "ANDed"
D3DCOLORtoUBYTE4 = "D3DCOLORtoUBYTE4"
Derivate = "Derivate"
inout = "inout"
Ect = "Ect"

[type.wgsl]
extend-glob = ["*.wgsl"]

[type.wgsl.extend-identifiers]
pn = "pn"

[type.yaml.extend-words]
dota = "dota"
