[package]
name = "naga-types"
version.workspace = true
authors.workspace = true
edition.workspace = true
description = "Common types for naga and wgpu"
homepage.workspace = true
repository.workspace = true
license.workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
serialize = ["dep:serde", "indexmap/serde"]
deserialize = ["dep:serde", "indexmap/serde"]
arbitrary = ["dep:arbitrary", "std", "indexmap/arbitrary"]
std = []

[dependencies]
arbitrary = { workspace = true, features = ["derive"], optional = true }
hashbrown.workspace = true
indexmap.workspace = true
rustc-hash.workspace = true
serde = { workspace = true, features = ["alloc", "derive"], optional = true }
thiserror.workspace = true
