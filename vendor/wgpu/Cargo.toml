[workspace]
resolver = "2"
members = [
    "cts_runner",
    "deno_webgpu",

    # default members
    "benches",
    "examples/features",
    "examples/standalone/*",
    "examples/bug-repro/*",
    "lock-analyzer",
    "naga-cli",
    "naga-test",
    "naga-types",
    "naga",
    "naga/fuzz",
    "naga/hlsl-snapshots",
    "naga/xtask",
    "player",
    "tests",
    "wgpu-core",
    "wgpu-core/platform-deps/*",
    "wgpu-hal",
    "wgpu-info",
    "wgpu-macros",
    "wgpu-naga-bridge",
    "wgpu-types",
    "wgpu",
    "xtask",
]
exclude = []
default-members = [
    "benches",
    "examples/features",
    "examples/standalone/*",
    "examples/bug-repro/*",
    "lock-analyzer",
    "naga-cli",
    "naga-test",
    "naga-types",
    "naga",
    "naga/fuzz",
    "naga/hlsl-snapshots",
    "naga/xtask",
    "player",
    "tests",
    "wgpu-core",
    "wgpu-core/platform-deps/*",
    "wgpu-hal",
    "wgpu-info",
    "wgpu-macros",
    "wgpu-naga-bridge",
    "wgpu-types",
    "wgpu",
    "xtask",
]

# NOTE: many packages have non-inherited [lints] sections (Cargo does not support combining
# workspace inheritance with customization) and must be updated separately.
[workspace.lints.rust]
missing_debug_implementations = "warn"

[workspace.lints.clippy]
ref_as_ptr = "warn"
# NOTE: clippy configuration values (disallowed-types and
# large-error-threshold) are in other file: clippy.toml

[workspace.package]
edition = "2021"
rust-version = "1.93"
keywords = ["graphics"]
license = "MIT OR Apache-2.0"
homepage = "https://wgpu.rs/"
repository = "https://github.com/gfx-rs/wgpu"
version = "30.0.0"
authors = ["gfx-rs developers"]

[workspace.dependencies]
naga = { version = "30.0.0", path = "./naga" }
naga-test = { path = "./naga-test" }
naga-types = { version = "30.0.0", path = "./naga-types" }
wgpu = { version = "30.0.0", path = "./wgpu", default-features = false, features = [
    "std",
    "serde",
    "wgsl",
    "vulkan",
    "gles",
    "dx12",
    "metal",
    "vulkan-portability",
    "angle",
    "static-dxc",
] }
wgpu-core = { version = "30.0.0", path = "./wgpu-core" }
wgpu-hal = { version = "30.0.0", path = "./wgpu-hal" }
wgpu-macros = { version = "30.0.0", path = "./wgpu-macros" }
wgpu-naga-bridge = { version = "30.0.0", path = "./wgpu-naga-bridge" }
wgpu-test = { version = "30.0.0", path = "./tests" }
wgpu-types = { version = "30.0.0", path = "./wgpu-types", default-features = false }

# These _cannot_ have a version specified. If it does, crates.io will look
# for a version of the package on crates when we publish naga. Path dependencies
# are allowed through though.
hlsl-snapshots = { path = "naga/hlsl-snapshots" }

wgpu-core-deps-windows-linux-android = { version = "30.0.0", path = "./wgpu-core/platform-deps/windows-linux-android" }
wgpu-core-deps-apple = { version = "30.0.0", path = "./wgpu-core/platform-deps/apple" }
wgpu-core-deps-wasm = { version = "30.0.0", path = "./wgpu-core/platform-deps/wasm" }
wgpu-core-deps-emscripten = { version = "30.0.0", path = "./wgpu-core/platform-deps/emscripten" }

anyhow = { version = "1.0.87", default-features = false }
approx = "0.5"
arbitrary = "1.4.2"
argh = "0.1.13"
arrayvec = { version = "0.7.1", default-features = false }
bincode = "2"
bit-set = { version = "0.10", default-features = false }
bit-vec = { version = "0.9.1", default-features = false }
bitflags = "2.9"
bytemuck = { version = "1.22", features = [
    "extern_crate_alloc",
    "min_const_generics",
] }
cargo_metadata = "0.23"
cfg_aliases = "0.2.1"
cfg-if = "1"
codespan-reporting = { version = "0.13", default-features = false }
diff = "0.1"
document-features = "0.2.10"
encase = "0.12"
env_logger = { version = "0.11", default-features = false }
exhaust = "0.2"
fern = "0.7"
flume = "0.12"
futures-lite = "2"
glam = "0.33.0"
glob = "0.3"
half = { version = "2.5", default-features = false } # We require 2.5 to have `Arbitrary` support.
hashbrown = { version = "0.17", default-features = false, features = [
    "default-hasher",
    "inline-more",
] }
heck = "0.5"
image = { version = "0.25", default-features = false, features = ["png"] }
indexmap = { version = "2.11.4", default-features = false }
indicatif = "0.18"
itertools = { version = "0.14" }
jobserver = "0.1"
ktx2 = "0.5"
libc = { version = "0.2.183", default-features = false }
# See https://github.com/rust-fuzz/libfuzzer/issues/126
libfuzzer-sys = ">0.4.0,<=0.4.7"
libloading = "0.8"
libm = { version = "0.2.6", default-features = false }
libtest-mimic = "0.8"
log = "0.4.29"
macro_rules_attribute = "0.2"
nanoserde = "0.2"
nanorand = { version = "0.8", default-features = false, features = ["wyrand"] }
noise = "0.9"
num_cpus = "1"
# `half` requires 0.2.16 for `FromBytes` and `ToBytes`.
num-traits = { version = "0.2.16", default-features = false }
nv-flip = "0.1"
obj = "0.10"
# NOTE: once_cell/std is *required* for some commonly-used features, selecting this per crate
once_cell = { version = "1.21", default-features = false }
# Firefox has 3.4.0 vendored, so we allow that version in our dependencies
ordered-float = { version = ">=3, <6.0", default-features = false }
parking_lot = "0.12.3"
petgraph = { version = "0.8", default-features = false }
pico-args = { version = "0.5", features = [
    "eq-separator",
    "short-space-opt",
    "combined-flags",
] }
png = "0.18"
pollster = "0.4"
portable-atomic = "1.10"
portable-atomic-util = "0.2.4"
pp-rs = "0.2.1"
profiling = { version = "1.0.1", default-features = false }
quote = "1.0.38"
raw-window-handle = { version = "0.6.2", default-features = false }
rayon = "1.3"
regex-lite = "0.1"
renderdoc-sys = "1"
rspirv = "0.13"
ron = "0.12"
# NOTE: rustc-hash v2 is a completely different hasher with different performance characteristics
# see discussion here (including with some other alternatives): https://github.com/gfx-rs/wgpu/issues/6999
# (using default-features = false to support no-std build, avoiding any extra features that may require std::collections)
rustc-hash = { version = "1.1", default-features = false }
serde_json = "1.0.143"
serde = { version = "1.0.225", default-features = false }
shell-words = "1"
smallvec = "1.14"
spirv = "0.4"
static_assertions = "1.1"
strum = { version = "0.28", default-features = false, features = ["derive"] }
syn = "2.0.98"
tempfile = "3"
toml = "1.0.0"
trybuild = "1"
tracy-client = "0.18"
thiserror = { version = "2.0.12", default-features = false }
ureq = { version = "3.2.0", default-features = false }
unicode-ident = "1.0.5"
walkdir = "2.3"
winit = { version = "0.30.8", features = ["android-native-activity"] }
which = "8"
xshell = "0.2.2"

# Metal dependencies
block2 = "0.6.2"
objc2 = "0.6.3"
objc2-core-foundation = { version = "0.3.2", default-features = false, features = [
    "std",
    "CFCGTypes",
] }
objc2-core-graphics = { version = "0.3.2", default-features = false, features = [
    "std",
    "CGColorSpace",
] }
objc2-foundation = { version = "0.3.2", default-features = false, features = [
    "std",
    "NSError",
    "NSProcessInfo",
    "NSRange",
    "NSString",
] }
objc2-metal = { version = "0.3.2", default-features = false, features = [
    "std",
    "block2",
    "MTLAllocation",
    "MTLBlitCommandEncoder",
    "MTLBlitPass",
    "MTLBuffer",
    "MTLCaptureManager",
    "MTLCaptureScope",
    "MTLCommandBuffer",
    "MTLCommandEncoder",
    "MTLCommandQueue",
    "MTLComputeCommandEncoder",
    "MTLComputePass",
    "MTLComputePipeline",
    "MTLCounters",
    "MTLDepthStencil",
    "MTLDevice",
    "MTLDrawable",
    "MTLEvent",
    "MTLLibrary",
    "MTLPipeline",
    "MTLPixelFormat",
    "MTLRenderCommandEncoder",
    "MTLRenderPass",
    "MTLRenderPipeline",
    "MTLResource",
    "MTLSampler",
    "MTLStageInputOutputDescriptor",
    "MTLTexture",
    "MTLTypes",
    "MTLVertexDescriptor",
    "MTLAccelerationStructure",
    "MTLAccelerationStructureTypes",
    "MTLAccelerationStructureCommandEncoder",
    "MTLResidencySet",
] }
objc2-quartz-core = { version = "0.3.2", default-features = false, features = [
    "std",
    "objc2-core-foundation",
    "objc2-core-graphics",
    "CALayer",
    "CAMetalLayer",
    "objc2-metal",
] }
raw-window-metal = "1.0"

# Vulkan dependencies
android_system_properties = "0.1.1"
ash = "0.38"

# DX12 dependencies
range-alloc = "0.1"
mach-dxcompiler-rs = { version = "0.1.4", default-features = false } # remember to increase max_shader_model if applicable
windows-core = { version = "0.62", default-features = false }
windows-result = { version = "0.4", default-features = false }

# DX12 and Vulkan dependencies
gpu-allocator = { version = "0.28", default-features = false, features = [
    "hashbrown",
] }

# Gles dependencies
khronos-egl = "6"
glow = "0.17"
glutin = { version = "0.32", default-features = false }
glutin-winit = { version = "0.5", default-features = false }
glutin_wgl_sys = "0.6"

# DX12 and GLES dependencies
windows = { version = "0.62", default-features = false }

# wasm32 dependencies
console_error_panic_hook = "0.1.5"
console_log = "1"
js-sys = { version = "0.3.85", default-features = false }
wasm-bindgen = { version = "0.2.108", default-features = false }
wasm-bindgen-futures = { version = "0.4.58", default-features = false }
web-sys = { version = "0.3.85", default-features = false }
web-time = "1.1.0"

# deno dependencies
deno_console = "0.214.0"
deno_core = "0.355.0"
deno_features = "0.11.0"
deno_url = "0.214.0"
deno_web = "0.245.0"
deno_webidl = "0.214.0"
deno_webgpu = { version = "0.181.0", path = "./deno_webgpu" }
deno_unsync = "0.4.4"
deno_error = "0.7.0"
tokio = "1.47"
termcolor = "1.4.1"

# android dependencies
ndk-sys = "0.6"

# These overrides allow our examples to explicitly depend on release crates
[patch.crates-io]
wgpu = { path = "./wgpu" }

env_logger = { version = "0.11", git = "https://github.com/rust-cli/env_logger.git", rev = "d550741" }
libtest-mimic = { version = "0.8", git = "https://github.com/cwfitzgerald/libtest-mimic.git", rev = "9979b3c" }

[profile.release]
lto = "thin"
debug = true

# Speed up image comparison even in debug builds
[profile.dev.package."nv-flip-sys"]
opt-level = 3
