[package]
name = "wgpu-examples"
version.workspace = true
authors.workspace = true
edition.workspace = true
description = "Common example code"
homepage.workspace = true
repository.workspace = true
keywords.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false

[lib]
path = "src/lib.rs"
harness = false
bench = false

[[bin]]
name = "wgpu-examples"
path = "src/main.rs"
test = false

[features]
default = []
webgl = ["wgpu/webgl", "wgpu-test/webgl"]
webgpu = ["wgpu/webgpu"]
exhaust = ["wgpu/exhaust"]

[dependencies]
bytemuck.workspace = true
cfg-if.workspace = true
encase = { workspace = true }
flume.workspace = true
glam = { workspace = true, features = ["bytemuck", "encase"] }
half = { workspace = true, features = ["bytemuck"] }
ktx2.workspace = true
log.workspace = true
nanorand = { workspace = true, features = ["getrandom"] }
noise.workspace = true
obj.workspace = true
png.workspace = true
pollster.workspace = true
web-time.workspace = true
winit.workspace = true

[dev-dependencies]
wgpu-test.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
env_logger.workspace = true
wgpu = { workspace = true, features = ["trace"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook.workspace = true
console_log.workspace = true
fern.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
wgpu = { workspace = true, default-features = false, features = [
    "wgsl",
    "std",
    "trace",
] }
# We need these features in the framework examples and tests
web-sys = { workspace = true, features = [
    "Location",
    "Blob",
    "RequestInit",
    "RequestMode",
    "Request",
    "ImageData",
    "Response",
    "HtmlImageElement",
    "WebGl2RenderingContext",
    "CanvasRenderingContext2d",
] }

[lints.clippy]
disallowed_types = "allow"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(wasm_test)'] }
