[package]
name        = "nebula"
version     = "0.1.0"
edition     = "2021"
description = "Modular GPU-accelerated data baking framework (façade crate)."
license     = "MIT OR Apache-2.0"

[dependencies]
nebula-core       = { path = "../nebula-core" }
nebula-gpu        = { path = "../nebula-gpu" }
nebula-serialize  = { path = "../nebula-serialize" }

nebula-light      = { path = "../nebula-light",      optional = true }
nebula-ao         = { path = "../nebula-ao",          optional = true }
nebula-probe      = { path = "../nebula-probe",       optional = true }
nebula-audio      = { path = "../nebula-audio",       optional = true }
nebula-visibility = { path = "../nebula-visibility",  optional = true }
nebula-nav        = { path = "../nebula-nav",         optional = true }

[dev-dependencies]
pollster = { workspace = true }

[features]
default     = ["light", "ao", "probe", "audio", "visibility", "nav"]
light       = ["dep:nebula-light"]
ao          = ["dep:nebula-ao"]
probe       = ["dep:nebula-probe"]
audio       = ["dep:nebula-audio"]
visibility  = ["dep:nebula-visibility"]
nav         = ["dep:nebula-nav"]
