[workspace]
resolver = "2"
members = [
    "crates/nebula",
    "crates/nebula-core",
    "crates/nebula-gpu",
    "crates/nebula-serialize",
    "crates/nebula-light",
    "crates/nebula-ao",
    "crates/nebula-probe",
    "crates/nebula-audio",
    "crates/nebula-visibility",
    "crates/nebula-nav",
]

[workspace.package]
version    = "0.1.0"
edition    = "2021"
license    = "MIT OR Apache-2.0"
authors    = ["Far Beyond Pulsar"]
repository = "https://github.com/Far-Beyond-Pulsar/Nebula"

# ── Internal workspace crates ─────────────────────────────────────────────────
[workspace.dependencies]
nebula-core       = { path = "crates/nebula-core" }
nebula-gpu        = { path = "crates/nebula-gpu" }
nebula-serialize  = { path = "crates/nebula-serialize" }
nebula-light      = { path = "crates/nebula-light" }
nebula-ao         = { path = "crates/nebula-ao" }
nebula-probe      = { path = "crates/nebula-probe" }
nebula-audio      = { path = "crates/nebula-audio" }
nebula-visibility = { path = "crates/nebula-visibility" }
nebula-nav        = { path = "crates/nebula-nav" }

# ── GPU (same vendored version as Helio for device/queue interop) ─────────────────────────
wgpu = { version = "30.0.0", path = "../wgpu/wgpu", default-features = false, features = ["wgsl", "dx12", "metal", "vulkan"] }

# ── Math + data ───────────────────────────────────────────────────────────────
glam      = { version = "0.33", features = ["bytemuck", "serde"] }
bytemuck  = { version = "1",    features = ["derive"] }
half      = { version = "2",    features = ["bytemuck"] }

# ── Serialization ─────────────────────────────────────────────────────────────
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
bincode    = { version = "2", features = ["serde"] }
zstd       = "0.13"

# ── Async + threading ─────────────────────────────────────────────────────────
async-trait = "0.1"
pollster    = "0.3"
rayon       = "1"

# ── Utilities ─────────────────────────────────────────────────────────────────
thiserror = "1"
log       = "0.4"
bitflags  = "2"
uuid      = { version = "1", features = ["v4", "serde"] }
